---
name: CI

on:
  push:
    branches: [main]

  pull_request:
    branches: [main]

  workflow_dispatch:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Run tests with coverage
        run: go test ./... -v -count=1 -coverprofile=coverage.out

  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Check go mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Run go vet
        run: go vet ./...

      - name: Install Helm
        uses: azure/setup-helm@v5

      - name: Helm lint
        run: helm lint helm/

      - name: Helm template
        run: helm template poolboy-scoring helm/ --set deploy=true

      - name: Docker build (builder stage)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Containerfile
          push: false
          target: builder
