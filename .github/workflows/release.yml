---
name: Release

on:
  push:
    tags:
      - "v[0-9]*"
      - "v[0-9]*.[0-9]*"
      - "v[0-9]*.[0-9]*.[0-9]*"

  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g., v0.1.0)"
        required: true
        type: string
        default: "latest"

env:
  IMAGE_NAME: poolboy-scoring

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.image_tags.outputs.VERSION }}
      image_base: ${{ steps.image_tags.outputs.IMAGE_BASE }}
      image_tags: ${{ steps.image_tags.outputs.IMAGE_TAGS }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Compute image tags
        id: image_tags
        run: |
          IMAGE_BASE="${{ vars.IMAGE_REGISTRY }}/${{ vars.IMAGE_REPOSITORY }}/${{ env.IMAGE_NAME }}"

          if [[ -n "${{ github.event.inputs.version }}" ]]; then
            VERSION=${{ github.event.inputs.version }}
            IMAGE_TAGS=(
              "${IMAGE_BASE}:${VERSION}"
            )
          else
            VERSION=${GITHUB_REF#refs/tags/}
            IMAGE_TAGS=(
              "${IMAGE_BASE}:latest"
              "${IMAGE_BASE}:${VERSION%.*}"
              "${IMAGE_BASE}:${VERSION}"
            )
          fi

          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "IMAGE_BASE=${IMAGE_BASE}" >> $GITHUB_OUTPUT
          ( IFS=$','; echo "IMAGE_TAGS=${IMAGE_TAGS[*]}" >> $GITHUB_OUTPUT )

      - name: Verify Helm chart appVersion
        if: github.event_name != 'workflow_dispatch'
        run: |
          VERSION="${{ steps.image_tags.outputs.VERSION }}"
          HELM_APP_VERSION=$(sed -nr 's/^appVersion: (.*)/\1/p' helm/Chart.yaml)
          if [[ "v${HELM_APP_VERSION}" != "${VERSION}" ]]; then
            echo "::error::Helm chart appVersion (${HELM_APP_VERSION}) does not match tag (${VERSION})!"
            echo "Update appVersion in helm/Chart.yaml to match the release tag."
            exit 1
          fi

  build-amd64:
    name: Build (amd64)
    needs: prepare
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to image registry
        uses: docker/login-action@v4
        with:
          registry: ${{ vars.IMAGE_REGISTRY }}/${{ vars.IMAGE_REPOSITORY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Containerfile
          push: true
          platforms: linux/amd64
          tags: ${{ needs.prepare.outputs.image_base }}:buildcache-linux-amd64
          cache-from: type=gha,scope=poolboy-scoring-linux-amd64
          cache-to: type=gha,mode=max,scope=poolboy-scoring-linux-amd64

  build-arm64:
    name: Build (arm64)
    needs: prepare
    runs-on: ubuntu-24.04-arm
    outputs:
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to image registry
        uses: docker/login-action@v4
        with:
          registry: ${{ vars.IMAGE_REGISTRY }}/${{ vars.IMAGE_REPOSITORY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Containerfile
          push: true
          platforms: linux/arm64
          tags: ${{ needs.prepare.outputs.image_base }}:buildcache-linux-arm64
          cache-from: type=gha,scope=poolboy-scoring-linux-arm64
          cache-to: type=gha,mode=max,scope=poolboy-scoring-linux-arm64

  manifest:
    name: Manifest
    needs: [prepare, build-amd64, build-arm64]
    runs-on: ubuntu-latest

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to image registry
        uses: docker/login-action@v4
        with:
          registry: ${{ vars.IMAGE_REGISTRY }}/${{ vars.IMAGE_REPOSITORY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Create and push multi-arch manifest
        run: |
          IMAGE_BASE="${{ needs.prepare.outputs.image_base }}"

          SOURCE_IMAGES=(
            "${IMAGE_BASE}@${{ needs.build-amd64.outputs.digest }}"
            "${IMAGE_BASE}@${{ needs.build-arm64.outputs.digest }}"
          )

          IFS=',' read -ra TAGS <<< "${{ needs.prepare.outputs.image_tags }}"
          for TAG in "${TAGS[@]}"; do
            docker buildx imagetools create -t "${TAG}" "${SOURCE_IMAGES[@]}"
          done
