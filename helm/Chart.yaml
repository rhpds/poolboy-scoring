apiVersion: v2
name: poolboy-scoring
description: |
  Go-based scoring controller that watches Poolboy ResourcePools,
  collects unbound ResourceHandles, calls the cluster-scheduler's
  /evaluate endpoint, and patches spec.preferenceScore on each handle.
